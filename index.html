// Helper: tentukan gender mana saja yang punya rubrik tier untuk parameter ini.
// Returns: 'L' / 'P' / 'BOTH' / null (kalau tidak ada rubrik sama sekali)
function tierGenders(tiersKey) {
  const lib = PHYSICAL_TIER_LIB[tiersKey];
  if (!lib) return null;
  const hasL = !!(lib.L && lib.L.tiers && lib.L.tiers.length);
  const hasP = !!(lib.P && lib.P.tiers && lib.P.tiers.length);
  if (hasL && hasP) return 'BOTH';
  if (hasL) return 'L';
  if (hasP) return 'P';
  return null;
}
// Cek apakah sebuah field relevan untuk gender atlet tertentu.
// - Field descriptive: selalu relevan (bukan dinilai, hanya dicatat)
// - Field tanpa tiersKey: selalu relevan (fallback min-max)
// - Field dengan tiersKey: relevan jika rubrik tier untuk gender atlet ada
function isFieldApplicableToGender(field, jk) {
  if (!field) return false;
  if (field.hidden) return false;
  if (field.descriptive) return true;
  if (!field.tiersKey) return true;
  const lib = PHYSICAL_TIER_LIB[field.tiersKey];
  if (!lib) return true; // tier rusak, tetap tampilkan supaya admin bisa lihat
  const def = lib[jk];
  return !!(def && def.tiers && def.tiers.length);
}

// Lookup grade kategori untuk satu pengukuran berdasarkan tier + jenis kelamin atlet.
// Optional `overrideMaxGrade` untuk kasus khusus per cabor (mis. ATLETIK PI MFT pakai /6 bukan /5 — sesuai rumus Excel).
function gradeFromTiers(value, tiersKey, jk, overrideMaxGrade) {
  if (value == null || value === '' || isNaN(value)) return null;
  const lib = PHYSICAL_TIER_LIB[tiersKey];
  if (!lib) return null;
  const def = lib[jk] || lib.L || lib.P;
  if (!def || !def.tiers || !def.tiers.length) return null;
  const v = Number(value);

  let matched = null;

  for (const t of def.tiers) {
    const ok = def.lowerBetter ? (v <= t.t) : (v >= t.t);
    if (ok) {
      matched = t;
      break;
    }
  }

  // Fallback "Kurang Sekali" = grade 1 jika tidak match tier mana pun
  const grade = matched ? matched.g : 1;
  const cat = matched ? matched.c : 'Kurang Sekali';

  const maxGrade =
    (overrideMaxGrade && overrideMaxGrade > 0)
      ? overrideMaxGrade
      : def.maxGrade;

  return {
    grade,
    maxGrade,
    cat,
    fraction: grade / maxGrade
  };
}


/* ======================================================
   AUTO HITUNG VO2MAX DARI LEVEL + SHUTTLE
====================================================== */
function calculateMFTVo2max(level, shuttle) {

  const lvl = parseFloat(level);
  const sht = parseFloat(shuttle);

  if (isNaN(lvl) || isNaN(sht)) return '';

  const vo2 =
    3.46 * (
      lvl + (
        sht / (8 + (0.1 * lvl))
      )
    ) + 12.2;

  return Number(vo2.toFixed(2));

}

/* =========== POSISI / KATEGORI PEMAIN ===========
   Kategori sederhana per cabor agar mudah dianalisis komposisi & filter. */
const FOOTBALL_POSITIONS = ['Penjaga Gawang', 'Pemain Belakang', 'Pemain Tengah', 'Pemain Depan'];
const VOLLEY_POSITIONS = ['Setter', 'Spiker', 'Libero'];
const SILAT_CATEGORIES = ['Seni', 'Tanding'];

// Helper: ambil daftar posisi/kategori per nama cabor (return null jika cabor tidak punya kategori).
// Matching toleran: case-insensitive + substring. Jadi "Bola Voli", "Bola Voli Putra", "Bola Voli Putri",
// "BolaVoli", "Volley" semua dapat list yang sama. Begitu pula "Sepak Bola" / "Sepakbola" / "Football".
function getPositionsForCabor(caborName) {
  if (!caborName) return null;
  const n = String(caborName).toLowerCase().replace(/[\s_-]/g, '');
  if (n.includes('sepakbola') || n.includes('football') || n.includes('soccer')) return FOOTBALL_POSITIONS;
  if (n.includes('bolavoli') || n.includes('volley') || n.includes('voli')) return VOLLEY_POSITIONS;
  if (n.includes('pencaksilat') || n.includes('silat')) return SILAT_CATEGORIES;
  return null;
}
// Helper: label header (Posisi vs Kategori) tergantung cabor
function getPositionLabel(caborName) {
  if (!caborName) return 'Posisi';
  const n = String(caborName).toLowerCase().replace(/[\s_-]/g, '');
  if (n.includes('pencaksilat') || n.includes('silat')) return 'Kategori';
  return 'Posisi';
}
// Helper: cabor punya posisi/kategori atau tidak
function caborHasPositions(caborName) { return !!getPositionsForCabor(caborName); }
// Helper: daftar SEMUA cabor yang punya posisi/kategori (untuk menu admin)
function caborsWithPositions() {
  return STATE.cabor.map(c => c.name).filter(n => caborHasPositions(n));

let STATE = null;
// Pemetaan kunci field fisik LAMA → BARU (untuk migrasi data tersimpan dari versi sebelum 1.2.0).
// Beberapa parameter dipecah jadi kanan/kiri (jump_hop_3x → kanan & kiri); sebagian rename (accel_10m → sprint_10m).
const PHYSICAL_KEY_MIGRATION = {
  jump_hop_3x: ['jump_hop_kanan', 'jump_hop_kiri'],
  accel_10m: 'sprint_10m',
  sprint_20m: 'sprint_10m',
  sprint_60m: 'sprint_10m',
  swim_sprint_20: 'sprint_10m',
  swim_endurance_4x: null, // hapus (tidak ada di rekap)
  swim_accel_10: null,
  panjang_tungkai: null, // sekarang dihitung otomatis dari tinggi-tinggi_duduk; tidak dinilai
  dn_max: null, // tidak dinilai dalam rekap
  dn_recovery: null,
};
function migratePhysicalDetails(athlete) {
  if (!athlete.physical_details || typeof athlete.physical_details !== 'object') return;
  const pd = athlete.physical_details;
  for (const [oldKey, target] of Object.entries(PHYSICAL_KEY_MIGRATION)) {
    if (!(oldKey in pd)) continue;
    const v = pd[oldKey];
    if (target == null) {
      // dihapus saja (tidak ada di rekap)
    } else if (Array.isArray(target)) {
      target.forEach(nk => { if (pd[nk] == null) pd[nk] = v; });
    } else if (typeof target === 'string') {
      if (pd[target] == null) pd[target] = v;
    }
    delete pd[oldKey];
  }
}

function migrateState(s) {
  const oldVersion = s.version || '1.0.0';
  // v1 had STATE.physical_fields (flat). v2 uses physical_fields_by_cabor.
  if (!s.physical_fields_by_cabor) s.physical_fields_by_cabor = {};
  // Ensure dashboard_config exists (merge with defaults so new fields are filled in)
  s.dashboard_config = { ...DEFAULT_STATE.dashboard_config, ...(s.dashboard_config || {}) };
  // Ensure report_config exists (merge with defaults)
  s.report_config = { ...DEFAULT_STATE.report_config, ...(s.report_config || {}) };

  // ---- Force-reset parameter fisik untuk cabor bawaan jika versi state lebih lama dari 1.2.0
  // (di versi 1.2.0 kami menerapkan rubrik tier resmi dari rekap KKO Mei 2025; field dan key berubah).
  // ATAU jika struktur lama terdeteksi (tidak ada satupun field dengan tiersKey/descriptive) → force-reset.
  const versionOlder = compareVersion(oldVersion, '1.2.0') < 0;
  const looksOld = (arr) => Array.isArray(arr) && arr.length
    && !arr.some(f => f && (f.tiersKey || f.descriptive));
  const needsPhysicalReset = versionOlder
    || Object.values(s.physical_fields_by_cabor || {}).some(looksOld);
  for (const c of s.cabor) {
    if (!s.weights[c.name]) s.weights[c.name] = { fisik:1/3, psi:1/3, skill:1/3 };
    const builtin = DEFAULT_STATE.physical_fields_by_cabor[c.name];
    if (!s.physical_fields_by_cabor[c.name]) {
      // Belum ada → pakai default (atau generic)
      if (builtin) {
        s.physical_fields_by_cabor[c.name] = JSON.parse(JSON.stringify(builtin));
      } else if (Array.isArray(s.physical_fields) && s.physical_fields.length) {
        s.physical_fields_by_cabor[c.name] = JSON.parse(JSON.stringify(s.physical_fields));
      } else {
        s.physical_fields_by_cabor[c.name] = [
          { key:'tinggi_badan', label:'Tinggi Badan', unit:'M', descriptive:true },
          { key:'berat_badan', label:'Berat Badan', unit:'Kg', descriptive:true },
          { key:'sit_reach', label:'Sit and Reach', unit:'Cm', tiersKey:'sit_reach' },
          { key:'core_strength', label:'Core Muscle Strength', unit:'Kali', tiersKey:'core_strength' },
          { key:'mft_vo2max', label:'MFT — Aerobik Fitness (VO2Max)', unit:'cc/kg/bb', tiersKey:'mft' },
        ];
      }
    } else if (needsPhysicalReset && builtin) {
      // Ada data lama tapi tanpa rubrik tier — preserve `hidden` flag user sebelumnya
      const old = s.physical_fields_by_cabor[c.name];
      const hiddenKeys = new Set(old.filter(f => f && f.hidden).map(f => f.key));
      const fresh = JSON.parse(JSON.stringify(builtin));
      fresh.forEach(f => { if (hiddenKeys.has(f.key)) f.hidden = true; });
      s.physical_fields_by_cabor[c.name] = fresh;
    }
  }
  // ---- Migrasi key physical_details lama → baru (jump_hop_3x → kanan/kiri, accel_10m → sprint_10m, dst.)
  if (needsPhysicalReset && Array.isArray(s.athletes)) {
    s.athletes.forEach(migratePhysicalDetails);
  }
  // ---- Migrasi posisi pemain Sepak Bola dari kode lama (Kiper (GK), Bek Tengah (CB), dll) ke 4 kategori baru
  if (Array.isArray(s.athletes)) {
    const FB_POSITION_MAP = {
      'Kiper (GK)':'Penjaga Gawang',
      'Bek Tengah (CB)':'Pemain Belakang','Bek Kanan (RB)':'Pemain Belakang','Bek Kiri (LB)':'Pemain Belakang',
      'Gelandang Bertahan (DM)':'Pemain Tengah','Gelandang Tengah (CM)':'Pemain Tengah','Gelandang Serang (AM)':'Pemain Tengah',
      'Sayap Kanan (RW)':'Pemain Depan','Sayap Kiri (LW)':'Pemain Depan',
      'Penyerang Tengah (ST)':'Pemain Depan','Penyerang Kedua (SS)':'Pemain Depan',
    };
    s.athletes.forEach(a => {
      if (a.cabor === 'Sepak Bola' && a.posisi && FB_POSITION_MAP[a.posisi]) a.posisi = FB_POSITION_MAP[a.posisi];
    });
  }
  // ---- Hapus konfigurasi JSONBin lama kalau masih ada (versi <1.3)
  delete s.cloud_sync;
  if (typeof s.rev !== 'number') s.rev = 0;
  if (!s.device_id) s.device_id = 'dev-' + Math.random().toString(36).slice(2,8) + '-' + Date.now().toString(36);
  // remove obsolete flat field
  delete s.physical_fields;
  // tandai versi terbaru agar migrasi tidak berulang
  s.version = VERSION;
  return s;
}

// Helper: bandingkan versi semver-lite. Hasil <0 jika a < b, 0 jika sama, >0 jika a > b.
function compareVersion(a, b) {
  const pa = String(a||'0').split('.').map(n => parseInt(n,10)||0);
  const pb = String(b||'0').split('.').map(n => parseInt(n,10)||0);
  for (let i=0; i<Math.max(pa.length,pb.length); i++) {
    const x = pa[i]||0, y = pb[i]||0;
    if (x !== y) return x - y;
  }
  return 0;
}
function loadState() {

  const s = JSON.parse(JSON.stringify(DEFAULT_STATE));

  for (const c of s.cabor)
    s.weights[c.name] = {
      fisik:1/3,
      psi:1/3,
      skill:1/3
    };

  return s;
}

}

    const payload = STATE.athletes.map(athleteToRow);
    // Upsert berdasarkan id (kalau ada id) atau insert baru
    const { error } = await sb.from('athletes').upsert(payload, { onConflict: 'id' });
    if (error) throw new Error(error.message);
    STATE._cloud_last_push = Date.now();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch(e){}
    emitCloudEvent({ type:'push-ok', count: payload.length, at: STATE._cloud_last_push });
  } catch(e) {
    console.warn('Cloud push gagal:', e);
    emitCloudEvent({ type:'push-err', error: String(e.message || e) });
  } finally {
    _cloudSyncing = false;
  }
}

// PULL: load atlet dari Supabase ke STATE (semua mode)
async function cloudPull() {
  if (_cloudSyncing) return;
  const sb = initSupabase(); if (!sb) return;
  _cloudSyncing = true;
  emitCloudEvent({ type:'pull-start' });
  try {
    const { data, error } = await sb.from('athletes').select('*');
    if (error) throw new Error(error.message);
    if (Array.isArray(data) && data.length > 0) {
      // Preserve detail object lokal (physical_details, dst.) per atlet berdasarkan id
      const localById = {};
      (STATE.athletes || []).forEach(a => { if (a.id != null) localById[a.id] = a; });
      STATE.athletes = data.map(r => {
        const merged = rowToAthlete(r);
        const local = localById[r.id];
        if (local) {
          merged.physical_details = local.physical_details;
          merged.skill_details = local.skill_details;
          merged.psi_details = local.psi_details;
          merged.fisik_manual = local.fisik_manual;
        }
        return merged;
      });
      recomputeAll();
      STATE._cloud_last_pull = Date.now();
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch(e){}
      // Re-render kalau tidak sedang edit modal
      if (!document.querySelector('.modal-overlay')) render();
      emitCloudEvent({ type:'pull-applied', count: data.length });
    } else {
      emitCloudEvent({ type:'pull-ok-empty' });
    }
  } catch(e) {
    console.warn('Cloud pull gagal:', e);
    emitCloudEvent({ type:'pull-err', error: String(e.message || e) });
  } finally {
    _cloudSyncing = false;
  }
}

// REALTIME: subscribe perubahan tabel athletes → auto-pull
function setupCloudRealtime() {
  const sb = initSupabase(); if (!sb) return;
  if (_supabaseChannel) return; // Sudah subscribe
  _supabaseChannel = sb
    .channel('athletes-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'athletes' }, payload => {
      emitCloudEvent({ type:'realtime-event', event: payload.eventType });
      // Tunggu sebentar lalu pull (debounce)
      setTimeout(cloudPull, 500);
    })
    .subscribe();
}
function teardownCloudRealtime() {
  if (_supabaseChannel) {
    _supabaseChannel.unsubscribe();
    _supabaseChannel = null;
  }
}

/* =========== SCORING ENGINE (CENTRALIZED) ===========
   SATU function untuk hitung skor akhir. Dipakai oleh:
   - recomputeAll() (re-hitung semua atlet)
   - athleteToRow() saat push ke Supabase
   - Dashboard / Ranking / Analytics / Compare / Export — semuanya baca a.nilai_akhir hasil function ini
   Formula: w.fisik × fisik + w.psi × psi + w.skill × skill (bobot per cabor)
*/
function calculateFinalScore(athlete, weights) {
  if (!athlete) return 0;
  const w = weights || (STATE.weights && STATE.weights[athlete.cabor]) || { fisik:1/3, psi:1/3, skill:1/3 };
  const f = Number(athlete.fisik) || 0;
  const p = Number(athlete.psi) || 0;
  const k = Number(athlete.skill) || 0;
  return +(f * w.fisik + p * w.psi + k * w.skill).toFixed(4);
}

function recomputeAll() {
  // 1. Hitung final score tiap atlet via function terpusat
  for (const a of STATE.athletes) {
    a.nilai_akhir = calculateFinalScore(a);
  }
  // 2. Rank per cabor
  const byCabor = {};
  for (const a of STATE.athletes) {
    if (!byCabor[a.cabor]) byCabor[a.cabor] = [];
    byCabor[a.cabor].push(a);
  }
  for (const list of Object.values(byCabor)) {
    list.sort((a,b) => (b.nilai_akhir||0) - (a.nilai_akhir||0));
    list.forEach((a,i) => a.rank_cabor = i+1);
  }
  // 3. Rank global
  const sorted = [...STATE.athletes].sort((a,b) => (b.nilai_akhir||0) - (a.nilai_akhir||0));
  sorted.forEach((a,i) => a.rank_global = i+1);
}

/* =========== UI HELPERS =========== */
function h(tag, props={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(props||{})) {
    if (k === 'className') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'checked' && v) e.checked = true;
    else if (k === 'selected' && v) e.selected = true;
    else if (v != null && v !== false) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'object' ? c : document.createTextNode(String(c)));
  }
  return e;
}

// Sort state per page (pageKey → { col, dir })
const _sortState = {};
function getSort(pageKey, defCol='nama', defDir='asc') {
  if (!_sortState[pageKey]) _sortState[pageKey] = { col:defCol, dir:defDir };
  return _sortState[pageKey];
}
function toggleSort(pageKey, col) {
  const s = getSort(pageKey);
  if (s.col === col) s.dir = s.dir === 'asc' ? 'desc' : 'asc';
  else { s.col = col; s.dir = 'asc'; }
  render();
}
// Sort array of rows by col+dir. Handles numeric & string values.
function sortRows(rows, col, dir, accessor) {
  const acc = accessor || (r => r[col]);
  const sign = dir === 'desc' ? -1 : 1;
  return rows.slice().sort((a,b) => {
    const va = acc(a), vb = acc(b);
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'number' && typeof vb === 'number') return sign * (va - vb);
    return sign * String(va).localeCompare(String(vb), 'id', { sensitivity:'base' });
  });
}
// Render a sortable <th>. If active column, show arrow.
function sortableTh(pageKey, col, label) {
  const s = getSort(pageKey);
  const active = s.col === col;
  const arrow = active ? (s.dir === 'asc' ? ' ▲' : ' ▼') : ' ⇅';
  return h('th', {
    className:'th cursor-pointer select-none hover:bg-slate-100' + (active ? ' text-blue-700' : ''),
    onClick:() => toggleSort(pageKey, col),
    title:'Klik untuk urutkan'
  }, label + arrow);
}

function importAthletesExcel() {
  if (!requireAdmin()) return;
  const inp = h('input', { type:'file', accept:'.xlsx,.xls' });
  inp.addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, { type:'binary' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);
        let created = 0, skipped = 0;
        for (const r of rows) {
          const nama = r.nama || r.Nama || r.NAMA;
          const cabor = r.cabor || r.Cabor || r.CABOR;
          if (!nama || !cabor) { skipped++; continue; }
          if (!STATE.cabor.find(c => c.name.toLowerCase() === String(cabor).toLowerCase())) { skipped++; continue; }
          const id = STATE.athletes.length ? Math.max(...STATE.athletes.map(x => x.id))+1+created : 1+created;
          const resolvedCabor = STATE.cabor.find(c => c.name.toLowerCase() === String(cabor).toLowerCase()).name;
          const rawPosisi = r.posisi || r.Posisi || r.POSISI || '';
          STATE.athletes.push({
            id, nama:String(nama).trim(),
            cabor:resolvedCabor,
            jk:String(r.jenis_kelamin||r.jk||'L').slice(0,1).toUpperCase(),
            fisik:Number(r.nilai_fisik||r.fisik)||0,
            psi:Number(r.nilai_psikologi||r.psi)||0,
            skill:Number(r.nilai_keterampilan||r.skill)||0,
            posisi: (caborHasPositions(resolvedCabor) && rawPosisi) ? String(rawPosisi).trim() : '',
          });
          created++;
        }
        recomputeAll(); saveState();
        alert(`Import selesai: ${created} dibuat, ${skipped} dilewati`);
        render();
      } catch(err) { alert('Gagal baca Excel: ' + err.message); }
    };
    reader.readAsBinaryString(file);
  });
  inp.click();
}

/* =========== NORMALIZATION HELPERS =========== */
// Normalize a raw value 0-100 based on the set of peers (same cabor) for the same field.
// lowerBetter=true → invert (smaller value → higher score).
function normalizeField(value, allValues, lowerBetter) {
  const valid = allValues.filter(v => v != null && !isNaN(v) && v !== '');
  if (valid.length < 2 || value == null || value === '' || isNaN(value)) return null;
  const min = Math.min(...valid), max = Math.max(...valid);
  if (max === min) return 50; // flat — neutral
  const n = (Number(value) - min) / (max - min);
  return +((lowerBetter ? 1 - n : n) * 100).toFixed(2);
}
// Compute overall physical score for one athlete from their physical_details.
// Strategi (sesuai rekap KKO Mei 2025):
//   1. Field `descriptive:true` di-skip (tidak dinilai).
//   2. Field dengan `tiersKey` → grading via PHYSICAL_TIER_LIB sesuai jenis kelamin atlet.
//      Skor parameter = grade / maxGrade × 100. Jika tidak match tier mana pun → "Kurang Sekali" (grade 1).
//      Jika tier untuk gender atlet tidak tersedia (mis. pull_up untuk P), parameter di-skip.
//   3. Field tanpa tiersKey & non-descriptive → fallback min-max normalization antar peserta cabor.
function computeFisikScore(athlete) {
  const fields = STATE.physical_fields_by_cabor[athlete.cabor] || [];
  if (!fields.length) return athlete.fisik || 0;
  const peers = STATE.athletes.filter(x => x.cabor === athlete.cabor);
  const scores = [];
  for (const f of fields) {

    /* =========================================
       MFT LEVEL & SHUTTLE HANYA INPUT
       TIDAK IKUT SCORING
    ========================================= */
    if (
      f.key === 'mft_level' ||
      f.key === 'mft_shuttle'
    ) {

      continue;

    }

    if (f.descriptive) continue;
    if (f.hidden) continue;
    const val = athlete.physical_details?.[f.key];
    if (val == null || val === '' || isNaN(val)) continue;
    if (f.tiersKey) {
      // Tier-based grading (rubrik resmi)
      const lib = PHYSICAL_TIER_LIB[f.tiersKey];
      if (!lib) continue;
      const def = lib[athlete.jk];
      if (!def || !def.tiers || !def.tiers.length) continue; // gender tidak punya rubrik (mis. pull_up untuk P)
      // Field-level maxGrade override (mis. ATLETIK PI MFT pakai /6 sesuai Excel — beda dgn PI cabor lain)
      const override = (athlete.jk === 'L' ? f.maxGradePA : f.maxGradePI);
      const result = gradeFromTiers(Number(val), f.tiersKey, athlete.jk, override);
      if (result == null) continue;
      scores.push(result.fraction * 100);
    } else {
      // Fallback: min-max normalization (jika field belum punya tier rubrik)
      const peerVals = peers.map(p => Number(p.physical_details?.[f.key])).filter(v => !isNaN(v));
      const s = normalizeField(Number(val), peerVals, f.lowerBetter);
      if (s != null) scores.push(s);
    }
  }
  if (!scores.length) return athlete.fisik || 0;
  return +(scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(2);
}
// Compute overall skill score: rata-rata dari skill_details[key] (semua sudah 0-100).
function computeSkillScore(athlete) {
  const fields = STATE.skill_fields[athlete.cabor] || [];
  if (!fields.length) return athlete.skill || 0;
  const vals = fields.map(f => Number(athlete.skill_details?.[f])).filter(v => !isNaN(v));
  if (!vals.length) return athlete.skill || 0;
  return +(vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2);
}
// Compute overall psi score from dimension percentages (rata-rata).
function computePsiScore(athlete) {
  const dims = STATE.psi_dimensions || [];
  if (!dims.length) return athlete.psi || 0;
  const vals = dims.map(d => Number(athlete.psi_details?.[d.key + '_pct'])).filter(v => !isNaN(v));
  if (!vals.length) return athlete.psi || 0;
  return +(vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2);
}

function editPsi(a) {
  if (!requireAdmin()) return;
  if (!a.psi_details) a.psi_details = {};
  const box = h('div', { className:'space-y-3', style:{ maxWidth:'480px' }});
  box.appendChild(h('h3', { className:'font-bold text-lg' }, 'Tes Psikologi: ' + a.nama));
  box.appendChild(h('p', { className:'text-xs text-slate-500' }, 'Input skor'));

  const inputs = {};
  STATE.psi_dimensions.forEach(d => {
    const maxTotal = d.count * d.max;
    const rawInp = h('input', { type:'number', step:'1', min:'0', max:String(maxTotal), className:'input',
      value: a.psi_details[d.key + '_raw'] != null ? String(a.psi_details[d.key + '_raw']) : '' });
    const pctInp = h('input', { type:'number', step:'0.01', min:'0', max:'100', className:'input',
      value: a.psi_details[d.key + '_pct'] != null ? String(a.psi_details[d.key + '_pct']) : '' });
    inputs[d.key] = { raw:rawInp, pct:pctInp, max:maxTotal };
    box.appendChild(h('div', { className:'border rounded p-3 bg-slate-50' },
      h('div', { className:'font-medium text-sm' }, d.label),
      h('div', { className:'text-xs text-slate-500 mb-2' }, d.count + ' item × skala ' + d.max + ' = max ' + maxTotal),
      h('div', { className:'grid grid-cols-2 gap-2' },
        h('label', { className:'text-xs' }, 'Skor Mentah (0-' + maxTotal + ')', rawInp),
        h('label', { className:'text-xs' }, 'Persen (0-100)', pctInp),
      ),
    ));
  });
  box.appendChild(h('label', { className:'block text-sm pt-2 border-t' },
    'Skor Psi Manual (0-100, override)',
    (() => {
      const mi = h('input', { type:'number', min:'0', max:'100', step:'0.01', className:'input',
        value: a.psi_manual != null ? String(a.psi_manual) : '' });
      inputs.__manual = mi;
      return mi;
    })(),
  ));
  box.appendChild(h('div', { className:'flex gap-2 justify-end pt-3 border-t' },
    h('button', { className:'btn btn-secondary', onClick:closeModal }, 'Batal'),
    h('button', { className:'btn btn-primary', onClick:() => {
      STATE.psi_dimensions.forEach(d => {
        const { raw, pct, max } = inputs[d.key];
        let pctVal = null;
        const pVal = pct.value.trim(), rVal = raw.value.trim();
        if (pVal !== '') pctVal = Math.max(0, Math.min(100, Number(pVal)));
        else if (rVal !== '') pctVal = max ? +((Number(rVal) / max) * 100).toFixed(2) : null;
        if (pctVal == null) {
          delete a.psi_details[d.key + '_pct']; delete a.psi_details[d.key + '_raw'];
        } else {
          a.psi_details[d.key + '_pct'] = pctVal;
          if (rVal !== '') a.psi_details[d.key + '_raw'] = Number(rVal);
        }
      });
      const m = inputs.__manual.value.trim();
      if (m === '') { delete a.psi_manual; a.psi = computePsiScore(a); }
      else { a.psi_manual = Math.max(0, Math.min(100, Number(m))); a.psi = a.psi_manual; }
      recomputeAll(); saveState(); closeModal(); render();
    }}, 'Simpan & Hitung'),
  ));
  showModal(box);
}

function editSkill(a) {
  if (!requireAdmin()) return;
  const fields = STATE.skill_fields[a.cabor] || [];
  if (!fields.length) { alert('Belum ada parameter keterampilan untuk cabor '+a.cabor+'.'); return; }
  if (!a.skill_details) a.skill_details = {};

  const box = h('div', { className:'space-y-3', style:{ maxWidth:'480px' }});
  box.appendChild(h('h3', { className:'font-bold text-lg' }, 'Tes Keterampilan: ' + a.nama));
  box.appendChild(h('p', { className:'text-xs text-slate-500' }, a.cabor + ' · isi 0-100 per parameter'));

  const inputs = {};
  fields.forEach(f => {
    const inp = h('input', { type:'number', min:'0', max:'100', step:'0.01', className:'input',
      value: a.skill_details[f] != null ? String(a.skill_details[f]) : '' });
    inputs[f] = inp;
    box.appendChild(h('label', { className:'block text-sm' }, f, inp));
  });
  box.appendChild(h('label', { className:'block text-sm pt-2 border-t' },
    'Skor Skill Manual (0-100, override)',
    (() => {
      const mi = h('input', { type:'number', min:'0', max:'100', step:'0.01', className:'input',
        value: a.skill_manual != null ? String(a.skill_manual) : '' });
      inputs.__manual = mi;
      return mi;
    })(),
  ));
  box.appendChild(h('div', { className:'flex gap-2 justify-end pt-3 border-t' },
    h('button', { className:'btn btn-secondary', onClick:closeModal }, 'Batal'),
    h('button', { className:'btn btn-primary', onClick:() => {
      fields.forEach(f => {
        const v = inputs[f].value.trim();
        if (v === '') delete a.skill_details[f];
        else a.skill_details[f] = Math.max(0, Math.min(100, Number(v)));
      });
      const m = inputs.__manual.value.trim();
      if (m === '') { delete a.skill_manual; a.skill = computeSkillScore(a); }
      else { a.skill_manual = Math.max(0, Math.min(100, Number(m))); a.skill = a.skill_manual; }
      recomputeAll(); saveState(); closeModal(); render();
    }}, 'Simpan & Hitung'),
  ));
  showModal(box);
}

function findAthleteByName(nama, cabor) {
  const n = String(nama||'').toLowerCase().trim();
  const c = String(cabor||'').toLowerCase().trim();
  return STATE.athletes.find(a =>
    a.nama.toLowerCase().trim() === n && (c === '' || a.cabor.toLowerCase().trim() === c)
  );
}

function exportTestExcel(type) {
  const wb = XLSX.utils.book_new();
  if (type === 'physical') {
    STATE.cabor.forEach(c => {
      const fields = STATE.physical_fields_by_cabor[c.name] || [];
      if (!fields.length) return;
      const peserta = STATE.athletes.filter(a => a.cabor === c.name);
      if (!peserta.length) return;
      const rows = peserta.map(a => {

  /* =========================================
     HITUNG IMT UNTUK EXPORT
  ========================================= */

  const tb = Number(a.physical_details?.tinggi_badan);
  const bb = Number(a.physical_details?.berat_badan);

  let imt = '';
  let status_imt = '';

  if (!isNaN(tb) && !isNaN(bb) && tb > 0) {

    imt = +(bb / (tb * tb)).toFixed(1);

    if (imt < 19) {
    status_imt = 'Underweight';
  } else if (imt < 25) {
    status_imt = 'Ideal';
  } else if (imt < 30) {
    status_imt = 'Overweight';
  } else if (imt < 35) {
    status_imt = 'Obesitas';
  }

  }

  const row = {
    nama: a.nama,
    jk: a.jk,
    cabor: a.cabor,
    IMT: imt,
    status_imt: status_imt
  };

  fields.forEach(f => {
    row[f.key] = a.physical_details?.[f.key] ?? '';
  });

  row.fisik_manual = a.fisik_manual ?? '';
  row.skor_fisik = +(a.fisik || 0).toFixed(2);

  return row;

});
      const ws = XLSX.utils.json_to_sheet(rows);
      const sheetName = c.name.slice(0, 31).replace(/[\\/?\*\[\]]/g, ' '); // Excel sheet name limit
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
    });
    if (!wb.SheetNames.length) { alert('Tidak ada data fisik untuk di-export.'); return; }
    XLSX.writeFile(wb, 'tes_fisik_kko.xlsx');
  } else if (type === 'psychological') {
    const rows = STATE.athletes.map(a => {
      const row = { nama:a.nama, jk:a.jk, cabor:a.cabor };
      STATE.psi_dimensions.forEach(d => {
        row[d.key + '_raw'] = a.psi_details?.[d.key + '_raw'] ?? '';
        row[d.key + '_pct'] = a.psi_details?.[d.key + '_pct'] ?? '';
      });
      row.psi_manual = a.psi_manual ?? '';
      row.skor_psi = +(a.psi||0).toFixed(2);
      return row;
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Psikologi');
    XLSX.writeFile(wb, 'tes_psikologi_kko.xlsx');
  } else if (type === 'skill') {
    STATE.cabor.forEach(c => {
      const fields = STATE.skill_fields[c.name] || [];
      const peserta = STATE.athletes.filter(a => a.cabor === c.name);
      if (!peserta.length || !fields.length) return;
      const rows = peserta.map(a => {
        const row = { nama:a.nama, jk:a.jk, cabor:a.cabor };
        fields.forEach(f => { row[f] = a.skill_details?.[f] ?? ''; });
        row.skill_manual = a.skill_manual ?? '';
        row.skor_skill = +(a.skill||0).toFixed(2);
        return row;
      });
      const ws = XLSX.utils.json_to_sheet(rows);
      XLSX.utils.book_append_sheet(wb, ws, c.name.slice(0,31).replace(/[\\/?\*\[\]]/g, ' '));
    });
    if (!wb.SheetNames.length) { alert('Tidak ada data skill untuk di-export.'); return; }
    XLSX.writeFile(wb, 'tes_keterampilan_kko.xlsx');
  }
}

function importTestExcel(type) {
  if (!requireAdmin()) return;
  const inp = h('input', { type:'file', accept:'.xlsx,.xls' });
  inp.addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, { type:'binary' });
        let updated = 0, skipped = 0;
        if (type === 'physical') {
          for (const sheetName of wb.SheetNames) {
            // Match sheet name to cabor (first exact match, then lowercase)
            const cabor = STATE.cabor.find(c =>
              c.name === sheetName || c.name.toLowerCase() === sheetName.toLowerCase()
              || c.name.slice(0,31) === sheetName
            );
            if (!cabor) continue;
            const fields = STATE.physical_fields_by_cabor[cabor.name] || [];
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
            for (const r of rows) {
              const a = findAthleteByName(r.nama || r.Nama, cabor.name);
              if (!a) { skipped++; continue; }
              if (!a.physical_details) a.physical_details = {};
              for (const fd of fields) {
                if (r[fd.key] != null && r[fd.key] !== '') a.physical_details[fd.key] = Number(r[fd.key]);
              }
              if (r.fisik_manual != null && r.fisik_manual !== '') {
                a.fisik_manual = Math.max(0, Math.min(100, Number(r.fisik_manual)));
                a.fisik = a.fisik_manual;
              } else if (r.skor_fisik != null && r.skor_fisik !== '') {
                a.fisik = Math.max(0, Math.min(100, Number(r.skor_fisik)));
              }
              updated++;
            }
          }
          // Recompute fisik via normalization for all athletes without manual override
          STATE.athletes.filter(a => a.fisik_manual == null).forEach(a => { a.fisik = computeFisikScore(a); });
        } else if (type === 'psychological') {
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet);
          for (const r of rows) {
            const a = findAthleteByName(r.nama || r.Nama, r.cabor || r.Cabor);
            if (!a) { skipped++; continue; }
            if (!a.psi_details) a.psi_details = {};
            STATE.psi_dimensions.forEach(d => {
              if (r[d.key + '_raw'] != null && r[d.key + '_raw'] !== '')
                a.psi_details[d.key + '_raw'] = Number(r[d.key + '_raw']);
              if (r[d.key + '_pct'] != null && r[d.key + '_pct'] !== '')
                a.psi_details[d.key + '_pct'] = Number(r[d.key + '_pct']);
            });
            if (r.psi_manual != null && r.psi_manual !== '') {
              a.psi_manual = Math.max(0, Math.min(100, Number(r.psi_manual)));
              a.psi = a.psi_manual;
            } else if (r.skor_psi != null && r.skor_psi !== '') {
              a.psi = Math.max(0, Math.min(100, Number(r.skor_psi)));
            } else {
              a.psi = computePsiScore(a);
            }
            updated++;
          }
        } else if (type === 'skill') {
          for (const sheetName of wb.SheetNames) {
            const cabor = STATE.cabor.find(c =>
              c.name === sheetName || c.name.toLowerCase() === sheetName.toLowerCase()
              || c.name.slice(0,31) === sheetName
            );
            if (!cabor) continue;
            const fields = STATE.skill_fields[cabor.name] || [];
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
            for (const r of rows) {
              const a = findAthleteByName(r.nama || r.Nama, cabor.name);
              if (!a) { skipped++; continue; }
              if (!a.skill_details) a.skill_details = {};
              fields.forEach(f => {
                if (r[f] != null && r[f] !== '') a.skill_details[f] = Math.max(0, Math.min(100, Number(r[f])));
              });
              if (r.skill_manual != null && r.skill_manual !== '') {
                a.skill_manual = Math.max(0, Math.min(100, Number(r.skill_manual)));
                a.skill = a.skill_manual;
              } else if (r.skor_skill != null && r.skor_skill !== '') {
                a.skill = Math.max(0, Math.min(100, Number(r.skor_skill)));
              } else {
                a.skill = computeSkillScore(a);
              }
              updated++;
            }
          }
        }
        recomputeAll(); saveState();
        alert(`Import ${type} selesai: ${updated} peserta di-update, ${skipped} dilewati.`);
        render();
      } catch(err) { alert('Gagal baca Excel: ' + err.message); }
    };
    reader.readAsBinaryString(file);
  });
  inp.click();
}

function renderCompareByCabor() {
  const wrap = h('div');
  const bar = h('div', { className:'card p-3 mb-4 flex flex-wrap gap-3 items-center no-print' });
  bar.appendChild(h('label', { className:'text-sm font-medium' }, 'Pilih Cabor:'));
  const sel = h('select', { className:'input max-w-xs' });
  STATE.cabor.forEach(c => sel.appendChild(h('option', { value:c.name, selected:c.name===_compareCabor }, c.name)));
  sel.addEventListener('change', e => { _compareCabor = e.target.value; render(); });
  bar.appendChild(sel);
  wrap.appendChild(bar);

  const cabor = _compareCabor || STATE.cabor[0]?.name;
  const peserta = STATE.athletes
    .filter(a => a.cabor === cabor)
    .slice()
    .sort((a,b) => (b.nilai_akhir||0) - (a.nilai_akhir||0));

  if (!peserta.length) {
    wrap.appendChild(h('div', { className:'card p-6 text-sm text-slate-500' },
      `Belum ada peserta untuk cabor "${cabor}".`));
    return wrap;
  }

  // Bar chart: grouped bar with Fisik/Psi/Skill/Nilai Akhir per peserta
  const chartCard = h('div', { className:'card p-5 mb-4' },
    h('h3', { className:'font-semibold mb-1' }, `Perbandingan Final — ${cabor}`),
    h('p', { className:'text-xs text-slate-500 mb-3' }, `${peserta.length} peserta, diurutkan berdasarkan Nilai Akhir tertinggi.`));
  const canvas = h('canvas', { style:{ maxHeight:'420px' }});
  chartCard.appendChild(canvas);
  wrap.appendChild(chartCard);

  // Radar chart: average per cabor + top 3 comparison
  const radarCard = h('div', { className:'card p-5 mb-4' },
    h('h3', { className:'font-semibold mb-3' }, 'Top 3 vs Rata-Rata (Radar)'));
  const radarCanvas = h('canvas', { style:{ maxHeight:'380px' }});
  radarCard.appendChild(radarCanvas);
  wrap.appendChild(radarCard);

  // Detail table with sorting
  const sCmp = getSort('compare_cabor', 'nilai_akhir', 'desc');
  const tableRows = sortRows(peserta, sCmp.col, sCmp.dir, a => {
    if (sCmp.col === 'nama' || sCmp.col === 'posisi') return a[sCmp.col] || '';
    return Number(a[sCmp.col] || 0);
  });

  const showPosisi = caborHasPositions(cabor);
  const posLabel = getPositionLabel(cabor) || 'Posisi';
  const tbl = h('table', { className:'min-w-full' });
  const headCells = [
    h('th', { className:'th' }, 'Peringkat'),
    sortableTh('compare_cabor', 'nama', 'Nama'),
    showPosisi ? sortableTh('compare_cabor', 'posisi', posLabel) : null,
    sortableTh('compare_cabor', 'fisik', 'Fisik'),
    sortableTh('compare_cabor', 'psi', 'Psi'),
    sortableTh('compare_cabor', 'skill', 'Skill'),
    sortableTh('compare_cabor', 'nilai_akhir', 'Nilai Akhir'),
  ].filter(Boolean);
  tbl.appendChild(h('thead', {}, h('tr', {}, ...headCells)));
  const tb = h('tbody');
  tableRows.forEach((p, i) => {
    const cells = [
      h('td', { className:'td font-bold' }, String(p.rank_cabor || (i+1))),
      h('td', { className:'td font-medium' }, p.nama),
    ];
    if (showPosisi) cells.push(h('td', { className:'td text-xs' }, p.posisi || '-'));
    cells.push(
      h('td', { className:'td' }, (p.fisik||0).toFixed(2)),
      h('td', { className:'td' }, (p.psi||0).toFixed(2)),
      h('td', { className:'td' }, (p.skill||0).toFixed(2)),
      h('td', { className:'td font-bold text-blue-700' }, (p.nilai_akhir||0).toFixed(2)),
    );
    tb.appendChild(h('tr', { className: i<3 ? 'bg-amber-50' : '' }, ...cells));
  });
  tbl.appendChild(tb);
  wrap.appendChild(h('div', { className:'card overflow-x-auto' }, tbl));

  setTimeout(() => {
    // Grouped bar chart: 4 datasets (Fisik, Psi, Skill, Nilai Akhir), labels=peserta
    const labels = peserta.map(p => p.nama);
    chartInstances.push(new Chart(canvas, {
      type:'bar',
      data:{
        labels,
        datasets:[
          { label:'Fisik', data:peserta.map(p => +(p.fisik||0).toFixed(2)), backgroundColor:'#3b82f6' },
          { label:'Psikologi', data:peserta.map(p => +(p.psi||0).toFixed(2)), backgroundColor:'#10b981' },
          { label:'Keterampilan', data:peserta.map(p => +(p.skill||0).toFixed(2)), backgroundColor:'#f59e0b' },
          { label:'Nilai Akhir', data:peserta.map(p => +(p.nilai_akhir||0).toFixed(2)), backgroundColor:'#1e3a8a' },
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{ y:{ beginAtZero:true, max:100 }, x:{ ticks:{ maxRotation:60, minRotation:45, font:{ size:10 }}}},
        plugins:{ legend:{ position:'top' }, title:{ display:false }}
      }
    }));

    // Radar: Top 3 + Rata-rata
    const top3 = peserta.slice(0, 3);
    const avg = k => +(peserta.reduce((s,p) => s + (p[k]||0), 0) / peserta.length).toFixed(2);
    const radarDs = top3.map((p,i) => {
      const col = ['59,130,246','16,185,129','245,158,11'][i];
      return { label:`#${i+1} ${p.nama}`,
        data:[p.fisik||0, p.psi||0, p.skill||0, p.nilai_akhir||0],
        backgroundColor:`rgba(${col},0.18)`, borderColor:`rgb(${col})`, borderWidth:2 };
    });
    radarDs.push({ label:'Rata-rata Cabor',
      data:[avg('fisik'), avg('psi'), avg('skill'), avg('nilai_akhir')],
      backgroundColor:'rgba(100,116,139,0.15)', borderColor:'rgb(100,116,139)', borderWidth:2, borderDash:[6,4] });
    chartInstances.push(new Chart(radarCanvas, {
      type:'radar',
      data:{ labels:['Fisik','Psikologi','Keterampilan','Nilai Akhir'], datasets:radarDs },
      options:{ responsive:true, maintainAspectRatio:false, scales:{ r:{ min:0, max:100 }}}
    }));
  }, 50);

  return wrap;
}

/* =========== EXPORT PAGE (Print-ready ranking with customizable kop) =========== */
function ExportPage() {
  const rc = { ...DEFAULT_STATE.report_config, ...(STATE.report_config || {}) };
  // Default mode: global (semua cabor dalam 1 laporan)
  const mode = _pageData.mode || 'global'; // 'global' | 'single' | 'all-split'
  const caborFilter = _pageData.cabor || '';

  const root = h('div', { className:'space-y-4' });

  // ---- Toolbar (hidden on print) ----
  const toolbar = h('div', { className:'card p-4 rep-toolbar no-print space-y-3' });
  toolbar.appendChild(h('div', { className:'flex items-center justify-between flex-wrap gap-3' },
    h('div', {},
      h('h2', { className:'text-lg font-bold text-slate-800' }, '📄 Export Laporan — Hasil Ranking'),
      h('p', { className:'text-xs text-slate-500' },
        'Cetak hasil ranking keseluruhan atau per cabor. Template PDF menggunakan kop surat yang bisa diatur admin di Pengaturan → Template Laporan.'),
    ),
    _isAdmin && h('button', {
      className:'btn btn-secondary',
      onClick:() => nav('admin', { tab:'laporan' }),
    }, '✏️ Edit Kop Laporan'),
  ));

  // Mode picker
  const modeRow = h('div', { className:'flex flex-wrap gap-2 items-center' },
    h('span', { className:'text-sm font-medium text-slate-700 mr-2' }, 'Jenis laporan:'),
    h('button', {
      className:'btn ' + (mode === 'global' ? 'btn-primary' : 'btn-secondary'),
      onClick:() => { _pageData = { mode:'global' }; render(); },
    }, '🌐 Keseluruhan (Global)'),
    h('button', {
      className:'btn ' + (mode === 'single' ? 'btn-primary' : 'btn-secondary'),
      onClick:() => { _pageData = { mode:'single', cabor: caborFilter || (STATE.cabor[0] && STATE.cabor[0].name) || '' }; render(); },
    }, '🏅 Per Cabor (satu laporan)'),
    h('button', {
      className:'btn ' + (mode === 'all-split' ? 'btn-primary' : 'btn-secondary'),
      onClick:() => { _pageData = { mode:'all-split' }; render(); },
    }, '📚 Semua Cabor (terpisah per halaman)'),
  );
  toolbar.appendChild(modeRow);

  // Sub-filter for single-cabor mode
  if (mode === 'single') {
    const caborSel = h('select', { className:'input max-w-xs' });
    STATE.cabor.forEach(c =>
      caborSel.appendChild(h('option', { value:c.name, selected:c.name === caborFilter }, c.name)),
    );
    caborSel.addEventListener('change', e => { _pageData = { mode:'single', cabor:e.target.value }; render(); });
    toolbar.appendChild(h('div', { className:'flex gap-2 items-center' },
      h('span', { className:'text-sm text-slate-600' }, 'Pilih cabor:'), caborSel));
  }

  // Action buttons (Print + Excel)
  toolbar.appendChild(h('div', { className:'flex gap-2 flex-wrap pt-2 border-t' },
    h('button', { className:'btn btn-primary', onClick:() => window.print() }, '🖨 Print / Save PDF'),
    h('button', { className:'btn btn-secondary', onClick:() => exportRankingExcel(mode, caborFilter) }, '⬇ Export Excel'),
    h('span', { className:'text-xs text-slate-500 ml-auto self-center' },
      'Tips: dialog print → "Save as PDF" · atur margin "Default" · hilangkan header/footer browser untuk hasil terbaik.'),
  ));

  root.appendChild(toolbar);

  // ---- Report document (this is what actually prints) ----
  const doc = h('div', { className:'report-wrap' });

  if (mode === 'global') {
    doc.appendChild(renderReportSection(rc,
      'Ranking Global — Semua Cabor',
      STATE.athletes.slice().sort((a,b) => (a.rank_global||9999) - (b.rank_global||9999)),
      /*showCaborCol*/ true,
    ));
  } else if (mode === 'single') {
    const selected = caborFilter || (STATE.cabor[0] && STATE.cabor[0].name);
    const list = STATE.athletes
      .filter(a => a.cabor === selected)
      .slice()
      .sort((a,b) => (a.rank_cabor||9999) - (b.rank_cabor||9999));
    doc.appendChild(renderReportSection(rc,
      'Ranking Cabor: ' + selected,
      list,
      /*showCaborCol*/ false,
    ));
  } else if (mode === 'all-split') {
    const caborNames = [...new Set(STATE.athletes.map(a => a.cabor))];
    caborNames.forEach((cName, idx) => {
      const list = STATE.athletes
        .filter(a => a.cabor === cName)
        .slice()
        .sort((a,b) => (a.rank_cabor||9999) - (b.rank_cabor||9999));
      const section = renderReportSection(rc, 'Ranking Cabor: ' + cName, list, /*showCaborCol*/ false);
      if (idx < caborNames.length - 1) section.classList.add('pagebreak');
      doc.appendChild(section);
    });
  }

  root.appendChild(doc);
  return root;
}

// Render one report document (kop + title + table + signature)
function renderReportSection(rc, judulLaporan, rows, showCaborCol) {
  const showSepakPosisi = !showCaborCol && rows.length && caborHasPositions(rows[0].cabor);
  const section = h('div', { className:'report-doc' });

  // ---- KOP (letterhead) ----
  if (rc.show_kop) {
    const kop = h('div', { className:'kop' });
    if (rc.show_logo && rc.kop_logo_url) {
      kop.appendChild(h('img', { src:rc.kop_logo_url, alt:'Logo' }));
    }
    const kopText = h('div', { className:'kop-text' },
      rc.kop_line1 && h('div', { className:'l1' }, rc.kop_line1),
      rc.kop_line2 && h('div', { className:'l2' }, rc.kop_line2),
      rc.kop_line3 && h('div', { className:'l3' }, rc.kop_line3),
      rc.kop_address && h('div', { className:'addr' }, rc.kop_address),
      rc.kop_contact && h('div', { className:'contact' }, rc.kop_contact),
    );
    kop.appendChild(kopText);
    if (rc.show_logo && rc.kop_logo_url) {
      // spacer kanan supaya teks tetap di tengah
      kop.appendChild(h('div', { style:{ width:'72px', flexShrink:'0' }}));
    }
    section.appendChild(kop);
  }

  // ---- Judul laporan ----
  section.appendChild(h('h2', { className:'rep-title' }, rc.report_title || 'LAPORAN HASIL SELEKSI'));
  section.appendChild(h('h3', { className:'rep-subtitle' }, judulLaporan));

  // ---- Ringkasan (opsional) ----
  if (rc.show_summary && rows.length) {
    const avg = (rows.reduce((s,a) => s + (a.nilai_akhir||0), 0) / rows.length).toFixed(2);
    const topS = Math.max(...rows.map(a => a.nilai_akhir||0)).toFixed(2);
    const lowS = Math.min(...rows.map(a => a.nilai_akhir||0)).toFixed(2);
    section.appendChild(h('div', { className:'sum-bar' },
      h('div', { className:'kv' }, h('div', { className:'k' }, 'Jumlah Peserta'), h('div', { className:'v' }, String(rows.length))),
      h('div', { className:'kv' }, h('div', { className:'k' }, 'Rata-Rata'), h('div', { className:'v' }, avg)),
      h('div', { className:'kv' }, h('div', { className:'k' }, 'Nilai Tertinggi'), h('div', { className:'v' }, topS)),
      h('div', { className:'kv' }, h('div', { className:'k' }, 'Nilai Terendah'), h('div', { className:'v' }, lowS)),
    ));
  }

  // ---- Tabel ranking ----
  const tbl = h('table', { className:'rep' });
  const thead = h('thead', {}, h('tr', {},
    h('th', { className:'num', style:{ width:'40px' }}, 'No'),
    h('th', { className:'num', style:{ width:'55px' }}, 'Rank'),
    h('th', {}, 'Nama'),
    h('th', { className:'num', style:{ width:'45px' }}, 'JK'),
    showCaborCol && h('th', {}, 'Cabor'),
    showSepakPosisi && h('th', {}, 'Posisi'),
    h('th', { className:'num', style:{ width:'70px' }}, 'Fisik'),
    h('th', { className:'num', style:{ width:'70px' }}, 'Psi'),
    h('th', { className:'num', style:{ width:'70px' }}, 'Skill'),
    h('th', { className:'num', style:{ width:'80px' }}, 'Nilai Akhir'),
  ));
  tbl.appendChild(thead);
  const tb = h('tbody');
  if (!rows.length) {
    tb.appendChild(h('tr', {},
      h('td', { colSpan:(showCaborCol ? 9 : (showSepakPosisi ? 9 : 8)), style:{ textAlign:'center', fontStyle:'italic' }}, 'Tidak ada data peserta.')));
  } else {
    rows.forEach((a, i) => {
      const rank = showCaborCol ? (a.rank_global || (i+1)) : (a.rank_cabor || (i+1));
      const rankCls = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
      tb.appendChild(h('tr', { className:rankCls },
        h('td', { className:'num' }, String(i+1)),
        h('td', { className:'num', style:{ fontWeight:'bold' }}, String(rank)),
        h('td', {}, a.nama || '-'),
        h('td', { className:'num' }, a.jk || '-'),
        showCaborCol && h('td', {}, a.cabor || '-'),
        showSepakPosisi && h('td', {}, a.posisi || '-'),
        h('td', { className:'num' }, (a.fisik||0).toFixed(2)),
        h('td', { className:'num' }, (a.psi||0).toFixed(2)),
        h('td', { className:'num' }, (a.skill||0).toFixed(2)),
        h('td', { className:'num', style:{ fontWeight:'bold' }}, (a.nilai_akhir||0).toFixed(2)),
      ));
    });
  }
  tbl.appendChild(tb);
  section.appendChild(tbl);

  // ---- Tanda tangan ----
  if (rc.show_signature) {
    const today = new Date();
    const bln = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const tgl = today.getDate() + ' ' + bln[today.getMonth()] + ' ' + today.getFullYear();
    section.appendChild(h('div', { className:'signature' },
      h('div', { className:'sig-block' },
        h('div', {}, (rc.ttd_kota || 'Cilacap') + ', ' + tgl),
        h('div', { className:'sig-jabatan' }, rc.ttd_jabatan || ''),
        h('div', { className:'sig-nama' }, rc.ttd_nama || ''),
        h('div', {}, rc.ttd_nip || ''),
      ),
    ));
  }

  return section;
}

// Export Excel helper for the Export page
function exportRankingExcel(mode, caborFilter) {
  const wb = XLSX.utils.book_new();
  const toRow = (a, showCabor) => ({
    rank_global:a.rank_global, rank_cabor:a.rank_cabor,
    nama:a.nama, jenis_kelamin:a.jk,
    ...(showCabor ? { cabor:a.cabor } : {}),
    posisi:a.posisi || '',
    nilai_fisik:+(a.fisik||0).toFixed(2), nilai_psikologi:+(a.psi||0).toFixed(2),
    nilai_keterampilan:+(a.skill||0).toFixed(2), nilai_akhir:+(a.nilai_akhir||0).toFixed(2),
  });
  if (mode === 'global') {
    const rows = STATE.athletes.slice().sort((a,b) => (a.rank_global||9999) - (b.rank_global||9999));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.map(a => toRow(a,true))), 'Global');
  } else if (mode === 'single') {
    const sel = caborFilter || (STATE.cabor[0] && STATE.cabor[0].name);
    const rows = STATE.athletes.filter(a => a.cabor === sel).sort((a,b) => (a.rank_cabor||9999) - (b.rank_cabor||9999));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.map(a => toRow(a,false))),
      sel.replace(/[^A-Za-z0-9]/g,'_').slice(0,31));
  } else { // all-split
    const caborNames = [...new Set(STATE.athletes.map(a => a.cabor))];
    XLSX.utils.book_append_sheet(wb,
      XLSX.utils.json_to_sheet(STATE.athletes.slice().sort((a,b) => (a.rank_global||9999) - (b.rank_global||9999)).map(a => toRow(a,true))),
      'Global');
    caborNames.forEach(cName => {
      const rows = STATE.athletes.filter(a => a.cabor === cName).sort((a,b) => (a.rank_cabor||9999) - (b.rank_cabor||9999));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows.map(a => toRow(a,false))),
        cName.replace(/[^A-Za-z0-9]/g,'_').slice(0,31));
    });
  }
  XLSX.writeFile(wb, 'laporan_ranking_kko.xlsx');
}

// Floating toast for save feedback
function flashSaveToast(msg) {
  const existing = document.getElementById('_save_toast');
  if (existing) existing.remove();
  const t = h('div', {
    id:'_save_toast',
    style:{
      position:'fixed', top:'20px', right:'20px', zIndex:'100',
      background:'linear-gradient(135deg,#059669,#10b981)', color:'#fff',
      padding:'10px 16px', borderRadius:'8px',
      boxShadow:'0 10px 30px rgba(16,185,129,.4)',
      fontSize:'.875rem', fontWeight:'500',
      display:'flex', alignItems:'center', gap:'8px',
      animation:'none',
    },
  }, h('span', {}, '✓'), h('span', {}, msg));
  document.body.appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .4s'; t.style.opacity = '0'; }, 2400);
  setTimeout(() => t.remove(), 2900);
}

    return box;
  }
  const selectedCabor = _pageData.posisiCabor && cabors.includes(_pageData.posisiCabor) ? _pageData.posisiCabor : cabors[0];
  const positions = getPositionsForCabor(selectedCabor);
  const posLabel = getPositionLabel(selectedCabor);

  box.appendChild(h('h3', { className:'font-semibold' }, 'Assign ' + posLabel + ' Pemain'));
  box.appendChild(h('p', { className:'text-xs text-slate-500' }, 'Pilih posisi sesuai dengan cabang olahraga'));

  const caborBar = h('div', { className:'flex flex-wrap gap-2 border-b pb-3 mb-3' });

    h('b', {}, posLabel + ' tersedia: '), positions.join(' · ')));

  const players = STATE.athletes.filter(a => a.cabor === selectedCabor)
    .slice().sort((a,b) => (b.nilai_akhir||0) - (a.nilai_akhir||0));
  if (!players.length) {
    box.appendChild(h('div', { className:'text-sm text-slate-500 mt-3' }, 'Belum ada peserta cabor ' + selectedCabor + '.'));

    h('th', { className:'th' }, posLabel),

    const sel = h('select', { className:'input max-w-xs' });

    positions.forEach(pos => sel.appendChild(h('option', { value:pos, selected:pos===p.posisi }, pos)));

      h('td', { className:'td' }, sel),
    ));
  });
  tbl.appendChild(tb);
  box.appendChild(h('div', { className:'overflow-x-auto border rounded' }, tbl));

  box.appendChild(h('div', { className:'flex gap-2 pt-3 border-t' },
    h('button', { className:'btn btn-primary', onClick:() => {
      players.forEach(p => { p.posisi = selects[p.id].value || ''; });
      saveState(); flashSaveToast(posLabel + ' tersimpan'); render();
    }}, 'Simpan Semua'),

// ===== Modal: Side-by-side threshold PA vs PI per parameter cabor =====
function showTierComparison(caborName) {
  const fields = (STATE.physical_fields_by_cabor[caborName] || []).filter(f => f.tiersKey);
  const box = h('div', { className:'space-y-3', style:{ maxHeight:'80vh', overflowY:'auto', maxWidth:'860px' }});
  box.appendChild(h('h3', { className:'font-bold text-lg' }, '📋 Detail Threshold Tier — ' + caborName));
  box.appendChild(h('p', { className:'text-sm text-slate-600' },
    'Tabel di bawah memperlihatkan rumus penilaian (rubrik tier) yang dipakai untuk masing-masing parameter, dipisah PA (Putra) vs PI (Putri). ',
    h('b', {}, 'Sesuai persis dengan rumus IF-chain di file Excel rekap KKO Mei 2025.')));
  box.appendChild(h('p', { className:'text-xs text-slate-500' },
    'Format: ', h('b', {}, 'Kategori (grade/maxGrade) thresholds'), '. Untuk parameter waktu (sprint/agility) ambang berarti "≤"; untuk parameter lain berarti "≥".'));

  if (!fields.length) {
    box.appendChild(h('div', { className:'text-sm text-slate-500 italic' }, 'Tidak ada parameter berskor di cabor ini.'));
  } else {
    const tbl = h('table', { className:'min-w-full text-xs' });
    tbl.appendChild(h('thead', {}, h('tr', {},
      h('th', { className:'th', style:{ background:'#0f172a', color:'#fff' }}, 'Parameter'),
      h('th', { className:'th', style:{ background:'#1e3a8a', color:'#fff' }}, '🔵 PA — Putra'),
      h('th', { className:'th', style:{ background:'#9d174d', color:'#fff' }}, '🔴 PI — Putri'),
    )));
    const tb = h('tbody');
    fields.forEach(f => {
      const lib = PHYSICAL_TIER_LIB[f.tiersKey];
      if (!lib) return;
      const formatTier = (def) => {
        if (!def || !def.tiers || !def.tiers.length) return h('span', { className:'text-slate-400 italic' }, '— tidak berlaku —');
        const op = def.lowerBetter ? '≤' : '≥';
        const items = def.tiers.map(t =>
          h('div', { className:'mb-1' },
            h('span', { className:'inline-block px-2 py-0.5 mr-2 rounded text-white font-semibold',
              style:{ background: t.c==='Sempurna'?'#7c3aed' : t.c==='Baik Sekali'?'#059669' : t.c==='Baik'?'#2563eb' : t.c==='Cukup'?'#f59e0b' : t.c==='Kurang'?'#ea580c' : '#dc2626',
                fontSize:'10px' }},
              t.c + ' (' + t.g + '/' + def.maxGrade + ')'),
            h('span', { className:'font-mono' }, op + ' ' + t.t),
          )
        );
        items.push(h('div', { className:'mt-1 text-[11px] text-slate-500 italic' }, '· < threshold terbawah → Kurang Sekali (1/' + def.maxGrade + ')'));
        return h('div', {}, ...items);
      };
      tb.appendChild(h('tr', {},
        h('td', { className:'td font-medium align-top', style:{ minWidth:'200px' }},
          h('div', {}, f.label),
          f.unit && h('div', { className:'text-[10px] text-slate-400' }, '(' + f.unit + ')'),
          f.lowerBetter && h('div', { className:'text-[10px] text-amber-700' }, '⏱ waktu (kecil=baik)'),
          h('div', { className:'text-[10px] text-slate-400 mt-1' }, 'Tier-key: ', h('code', { className:'bg-slate-100 px-1 rounded' }, f.tiersKey)),
        ),
        h('td', { className:'td align-top', style:{ background:'#eff6ff' }}, formatTier(lib.L)),
        h('td', { className:'td align-top', style:{ background:'#fdf2f8' }}, formatTier(lib.P)),
      ));
    });
    tbl.appendChild(tb);
    box.appendChild(h('div', { className:'overflow-x-auto border rounded' }, tbl));
  }

  box.appendChild(h('div', { className:'flex justify-end pt-3 border-t' },
    h('button', { className:'btn btn-secondary', onClick:closeModal }, 'Tutup')));
  showModal(box);
}

function AdminPsi() {
  const box = h('div', { className:'space-y-3' });
  box.appendChild(h('p', { className:'text-sm text-slate-500' }, 'Atur dimensi tes psikologi.'));
  const tbl = h('table', { className:'min-w-full' });
  tbl.appendChild(h('thead', {}, h('tr', {}, h('th', { className:'th' }, 'Key'), h('th', { className:'th' }, 'Label'), h('th', { className:'th' }, 'Jumlah Item'), h('th', { className:'th' }, 'Skala Max'), h('th', { className:'th' }, 'Aksi'))));
  const tb = h('tbody');
  STATE.psi_dimensions.forEach((d, i) => {
    const kInp = h('input', { className:'input', value:d.key });
    const lInp = h('input', { className:'input', value:d.label });
    const cInp = h('input', { type:'number', min:'1', className:'input', value:String(d.count) });
    const mInp = h('input', { type:'number', min:'1', className:'input', value:String(d.max) });
    kInp.addEventListener('change', e => { d.key = e.target.value.trim(); saveState(); });
    lInp.addEventListener('change', e => { d.label = e.target.value; saveState(); });
    cInp.addEventListener('change', e => { d.count = Number(e.target.value)||1; saveState(); });
    mInp.addEventListener('change', e => { d.max = Number(e.target.value)||1; saveState(); });
    tb.appendChild(h('tr', {},
      h('td', { className:'td' }, kInp),
      h('td', { className:'td' }, lInp),
      h('td', { className:'td' }, cInp),
      h('td', { className:'td' }, mInp),
      h('td', { className:'td' }, h('button', { className:'text-red-600 text-sm', onClick:() => {
        if (!confirm('Hapus dimensi '+d.label+'?')) return;
        STATE.psi_dimensions.splice(i, 1); saveState(); render();
      }}, 'Hapus')),
    ));
  });
  tbl.appendChild(tb);
  box.appendChild(h('div', { className:'overflow-x-auto' }, tbl));
  box.appendChild(h('button', { className:'btn btn-primary', onClick:() => {
    const k = prompt('Key (contoh: focus):'); if (!k) return;
    const l = prompt('Label:', k) || k;
    const c = Number(prompt('Jumlah item:','10')) || 10;
    const m = Number(prompt('Skala max per item:','7')) || 7;
    STATE.psi_dimensions.push({ key:k.trim(), label:l, count:c, max:m });
    saveState(); render();
  }}, '+ Tambah Dimensi'));
  return box;
}

/* =========== ADMIN: Cloud Sync (Supabase) =========== */
function AdminCloudSync() {
  const box = h('div', { className:'space-y-4 max-w-3xl' });
  box.appendChild(h('h3', { className:'font-semibold' }, '☁️ Cloud Sync (Supabase)'));
  box.appendChild(h('p', { className:'text-sm text-slate-600' },
    'Sistem ini menggunakan ', h('b', {}, 'Supabase'), ' sebagai backend cloud. Atlet di sinkron real-time antar device. ',
    'Admin: klik ', h('b', {}, '⬆ Simpan ke Cloud'), ' setelah selesai input untuk push ke server. ',
    'Viewer dan admin lain otomatis melihat update.'));

  // Status real-time
  const status = h('div', { className:'text-sm space-y-1' });
  function refreshStatus() {
    status.innerHTML = '';
    const lastPull = STATE._cloud_last_pull ? new Date(STATE._cloud_last_pull).toLocaleString('id-ID') : '— belum pernah —';
    const lastPush = STATE._cloud_last_push ? new Date(STATE._cloud_last_push).toLocaleString('id-ID') : '— belum pernah —';
    status.appendChild(h('div', { className:'flex flex-wrap gap-x-4 gap-y-1' },
      h('span', {}, '📡 SDK: ', h('b', { className: _supabase ? 'text-emerald-700' : 'text-red-700' }, _supabase ? 'TERHUBUNG' : 'BELUM CONNECT')),
      h('span', {}, '🔔 Realtime: ', h('b', { className: _supabaseChannel ? 'text-emerald-700' : 'text-slate-500' }, _supabaseChannel ? 'AKTIF' : 'NON-AKTIF')),
      h('span', {}, '👤 Mode: ', h('b', { className: _isAdmin ? 'text-blue-700' : 'text-amber-700' }, _isAdmin ? 'ADMIN (read/write)' : 'VIEWER (read-only)')),
    ));
    status.appendChild(h('div', { className:'text-xs text-slate-500' },
      '⬇ Last pull: ', h('b', {}, lastPull), ' · ⬆ Last push: ', h('b', {}, lastPush)));
    status.appendChild(h('div', { className:'text-xs text-slate-500' },
      'URL: ', h('code', { className:'bg-white px-1' }, SUPABASE_URL),
      ' · Tabel: ', h('code', { className:'bg-white px-1' }, 'athletes')));
  }
  refreshStatus();
  box.appendChild(h('div', { className:'card p-3 bg-emerald-50 border-emerald-200' }, status));

  // Action buttons
  box.appendChild(h('div', { className:'flex flex-wrap gap-2' },
    h('button', { className:'btn btn-primary', onClick:() => { cloudPush().then(refreshStatus); }},
      '⬆ Simpan ke Cloud (Push)'),
    h('button', { className:'btn btn-secondary', onClick:() => { cloudPull().then(refreshStatus); }},
      '⬇ Tarik dari Cloud (Pull)'),
    h('button', { className:'btn btn-secondary', onClick:() => {
      if (_supabaseChannel) { teardownCloudRealtime(); flashSaveToast('Realtime OFF'); }
      else { setupCloudRealtime(); flashSaveToast('Realtime ON'); }
      refreshStatus(); render();
    }}, '🔔 Toggle Realtime'),
  ));

  // Setup wizard
  box.appendChild(h('div', { className:'card p-3 bg-blue-50 border-blue-200 text-xs space-y-1' },
    h('b', {}, '📋 Setup Supabase (sekali untuk admin utama):'),
    h('div', {}, '1. Buka ', h('a', { href:'https://supabase.com', target:'_blank', className:'text-blue-700 underline' }, 'supabase.com'), ' → buat project gratis'),
    h('div', {}, '2. SQL Editor → jalankan query buat tabel:'),
    h('pre', { className:'bg-white p-2 rounded text-[10px] overflow-x-auto' },
      'CREATE TABLE athletes (\n  id BIGINT PRIMARY KEY,\n  nama TEXT, cabor TEXT, jk TEXT, posisi TEXT,\n  fisik FLOAT8, psikologi FLOAT8, skill FLOAT8, final_score FLOAT8\n);\n-- Enable RLS lalu policy untuk publik baca:\nALTER TABLE athletes ENABLE ROW LEVEL SECURITY;\nCREATE POLICY "anyone can read" ON athletes FOR SELECT USING (true);\nCREATE POLICY "anyone can write" ON athletes FOR ALL USING (true);'),
    h('div', {}, '3. Settings → API → copy ', h('b', {}, 'Project URL'), ' & ', h('b', {}, 'anon public key'), ' → ganti di kode HTML (variabel SUPABASE_URL & SUPABASE_ANON_KEY)'),
    h('div', {}, '4. Database → Replication → enable Realtime untuk tabel `athletes`'),
    h('div', { className:'text-amber-700' }, '⚠ Policy "anyone can write" ini permisif. Untuk production, batasi dengan Supabase Auth.'),
  ));

  // Live event log
  const eventLog = h('div', { className:'text-xs text-slate-600 mt-2 space-y-1', style:{ maxHeight:'200px', overflowY:'auto' }});
  onCloudSyncEvent(evt => {
    const ts = new Date().toLocaleTimeString('id-ID');
    const colors = { 'push-start':'#64748b', 'push-ok':'#059669', 'push-err':'#dc2626', 'pull-start':'#64748b', 'pull-applied':'#2563eb', 'pull-ok-empty':'#64748b', 'pull-err':'#dc2626', 'realtime-event':'#7c3aed' };
    const labels = {
      'push-start':'➡ Pushing…',
      'push-ok':'✓ Push OK · ' + (evt.count||0) + ' atlet',
      'push-err':'❌ Push gagal: ' + evt.error,
      'pull-start':'⬅ Pulling…',
      'pull-applied':'✓ Pull diterapkan · ' + (evt.count||0) + ' atlet',
      'pull-ok-empty':'· Pull OK (tabel kosong)',
      'pull-err':'❌ Pull gagal: ' + evt.error,
      'realtime-event':'🔔 Realtime: ' + (evt.event||'change'),
    };
    const line = h('div', { style:{ color:colors[evt.type] }}, '[' + ts + '] ' + (labels[evt.type] || evt.type));
    eventLog.insertBefore(line, eventLog.firstChild);
    refreshStatus();
  });
  box.appendChild(h('div', { className:'card p-3 bg-slate-50' },
    h('div', { className:'text-xs font-semibold text-slate-600 mb-1' }, 'Event Log Realtime:'),
    eventLog,
  ));

  return box;
}

function AdminBackup() {
  const box = h('div', { className:'space-y-4' });
  box.appendChild(h('h3', { className:'font-semibold' }, 'Backup & Restore'));
  box.appendChild(h('p', { className:'text-sm text-slate-500' }, 'Data tersimpan otomatis di browser (localStorage). Gunakan backup JSON agar bisa dipindah ke komputer lain atau dicadangkan.'));

  box.appendChild(h('div', { className:'grid grid-cols-1 md:grid-cols-3 gap-3' },
    h('button', { className:'btn btn-success', onClick:() => {
      const blob = new Blob([JSON.stringify(STATE, null, 2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `backup_kko_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }}, '⬇ Export JSON Backup'),
    h('button', { className:'btn btn-primary', onClick:() => {
      const inp = h('input', { type:'file', accept:'.json' });
      inp.addEventListener('change', e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!imported.athletes || !imported.cabor) return alert('File tidak valid');
            if (!confirm('Replace semua data saat ini dengan backup?')) return;
            STATE = imported;
            recomputeAll(); saveState();
            alert('Restore berhasil: ' + STATE.athletes.length + ' peserta, ' + STATE.cabor.length + ' cabor');
            render();
          } catch(err) { alert('Gagal parse JSON: ' + err.message); }
        };
        reader.readAsText(file);
      });
      inp.click();
    }}, '⬆ Import JSON Backup'),
    h('button', { className:'btn btn-danger', onClick:resetState }, '↺ Reset ke Default'),
  ));

  const stats = h('div', { className:'card p-4 mt-4 bg-slate-50' });
  stats.appendChild(h('h4', { className:'font-semibold mb-2' }, 'Status Data'));
  stats.appendChild(h('div', { className:'grid grid-cols-2 md:grid-cols-4 gap-3 text-sm' },
    h('div', {}, h('span', { className:'text-slate-500' }, 'Peserta: '), h('b', {}, String(STATE.athletes.length))),
    h('div', {}, h('span', { className:'text-slate-500' }, 'Cabor: '), h('b', {}, String(STATE.cabor.length))),
    h('div', {}, h('span', { className:'text-slate-500' }, 'Menu: '), h('b', {}, String(STATE.menu.length))),
    h('div', {}, h('span', { className:'text-slate-500' }, 'Ukuran: '), h('b', {}, `~${Math.round(JSON.stringify(STATE).length/1024)} KB`)),
  ));
  box.appendChild(stats);
  return box;
}

/* =========== MODAL =========== */
function Modal() {
  if (!_modal) return null;
  const overlay = h('div', { className:'modal-overlay', onClick:e => { if (e.target === e.currentTarget) closeModal(); }},
    h('div', { className:'modal' }, _modal));
  return overlay;
}

/* =========== MAIN RENDER =========== */
const PAGES = {
  dashboard:DashboardPage, athletes:AthletesPage,
  physical:PhysicalPage,
  psychological:PsychologicalPage,
  skill:SkillPage,
  weights:WeightsPage, ranking:RankingPage, analytics:AnalyticsPage,
  compare:ComparePage, exportp:ExportPage, admin:AdminPage,
};

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const page = (PAGES[_page] || DashboardPage)();
  const wrapper = h('div', { className:'flex min-h-screen' },
    Sidebar(),
    h('main', { className:'flex-1 p-6 overflow-x-auto' }, page),
  );
  app.appendChild(wrapper);
  const modal = Modal();
  if (modal) app.appendChild(modal);

  // Floating cloud save button — ADMIN ONLY
  if (_isAdmin) {
    const fab = h('button', {
      className:'no-print',
      style:{
        position:'fixed', right:'20px', bottom:'20px', zIndex:'9999',
        padding:'12px 18px', borderRadius:'12px', border:'none',
        background:'linear-gradient(135deg,#1d4ed8,#0ea5e9)', color:'#fff',
        fontWeight:'600', cursor:'pointer', boxShadow:'0 10px 25px rgba(29,78,216,.35)',
        display:'flex', alignItems:'center', gap:'8px', fontSize:'14px',
      },
      onClick: async () => {
        fab.disabled = true;
        const orig = fab.textContent;
        fab.textContent = '⏳ Menyimpan…';
        try {
          await cloudPush();
          flashSaveToast('✓ Data tersimpan ke Cloud (Supabase)');
        } catch(e) {
          alert('Gagal: ' + e.message);
        } finally {
          fab.disabled = false; fab.textContent = orig;
        }
      },
    }, '☁ Simpan ke Cloud');
    app.appendChild(fab);
  }

  // Viewer mode badge — visitor saja
  if (!_isAdmin) {
    const badge = h('div', {
      className:'no-print',
      style:{
        position:'fixed', right:'20px', bottom:'20px', zIndex:'9999',
        padding:'8px 14px', borderRadius:'999px',
        background:'rgba(15,23,42,.85)', color:'#fbbf24',
        fontWeight:'500', fontSize:'12px', backdropFilter:'blur(8px)',
        boxShadow:'0 4px 12px rgba(0,0,0,.2)',
        display:'flex', alignItems:'center', gap:'6px',
      },
    }, '👁 Viewer Mode · ', h('button', {
      style:{ background:'transparent', border:'none', color:'#60a5fa', cursor:'pointer', padding:'0', textDecoration:'underline', fontSize:'12px' },
      onClick: promptAdminLogin,
    }, 'Login Admin'));
    app.appendChild(badge);
  }
}

/* =========== INIT =========== */
STATE = JSON.parse(JSON.stringify(DEFAULT_STATE));

async function initializeApp() {

  // load backup json dulu
  try {

    const res = await fetch('./backup_psa.json');

    const backup = await res.json();

    // seluruh config sistem
    STATE = backup;

    console.log('Backup JSON loaded');

  } catch(err) {

    console.error('Gagal load backup JSON:', err);

    STATE = JSON.parse(JSON.stringify(DEFAULT_STATE));

  }

  // init supabase
  const sb = initSupabase();

  if (sb) {

  

    // load athletes terbaru dari supabase
    await loadAthletesFromSupabase();

    // realtime sync
    setupCloudRealtime();

  }

  recomputeAll();

  render();

}

initializeApp();

// VIEWER MODE detection: ?viewer=true di URL → tidak bisa edit
// Default: visitor (non-admin) = viewer mode. Login admin untuk write access.
(function detectViewerMode() {
  try {
    const params = new URLSearchParams(window.location.search);
    if (params.get('viewer') === 'true') {
      window._forceViewer = true;
      console.log('[VIEWER MODE] Forced via URL ?viewer=true');
    }
  } catch(e){}
})();

// Auto-init Supabase & cloud pull saat app load
(function initCloud() {
  if (initSupabase()) {
    // Pull data atlet dari cloud (semua mode bisa pull)
    loadAthletesFromSupabase().then(() => {

  recomputeAll();

  render();

  // realtime sync
  setupCloudRealtime();

}).catch(e => console.warn('Cloud init error:', e));
  }
})();

// Cleanup saat window ditutup
window.addEventListener('beforeunload', () => { teardownCloudRealtime(); });
